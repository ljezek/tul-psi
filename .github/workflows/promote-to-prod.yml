name: "Promote to Production"

on:
  workflow_run:
    workflows: ["E2E Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Full commit SHA to promote (leave blank = HEAD of main)"
        required: false
        type: string
      force:
        description: "Skip SHA regression check — REQUIRED when intentionally rolling back to an older SHA"
        required: false
        default: false
        type: boolean

concurrency:
  group: promote-to-prod
  cancel-in-progress: false   # never cancel an in-flight prod deploy

permissions:
  id-token: write
  contents: read

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────
  # No `environment:` here — uses the main-branch OIDC federated credential so
  # the gate runs automatically without requiring prod environment approval.
  # Deploy jobs below carry `environment: prod`, so protection rules apply there.
  gate:
    name: "Gate: resolve SHA, check ACR and regression"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      sha: ${{ steps.checks.outputs.sha }}
      should_skip: ${{ steps.checks.outputs.should_skip }}
      deploy_backend: ${{ steps.checks.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.checks.outputs.deploy_frontend }}
      backend_sha: ${{ steps.checks.outputs.backend_sha }}
      current_prod_sha: ${{ steps.checks.outputs.current_prod_sha }}
      is_forced: ${{ steps.checks.outputs.is_forced }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history needed for git merge-base ancestry check

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve SHA and run guards
        id: checks
        run: |
          # ── Resolve SHA ──────────────────────────────────────────────────
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.sha }}" ]]; then
            SHA="${{ inputs.sha }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "Target SHA: $SHA"

          # ── For workflow_dispatch: verify SHA is in main's history ────────
          # Prevents promoting an unmerged feature-branch commit, which would
          # bypass the merge + E2E contract that the automatic path enforces.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if ! git merge-base --is-ancestor "$SHA" "origin/main" 2>/dev/null; then
              echo "ERROR: SHA $SHA is not in the history of main."
              echo "Only commits that have been merged to main can be promoted to production."
              exit 1
            fi
            echo "SHA verified to be in main branch history."
          fi

          echo "sha=$SHA" >> $GITHUB_OUTPUT
          FORCE="${{ inputs.force || 'false' }}"
          echo "is_forced=$FORCE" >> $GITHUB_OUTPUT

          # ── SHA regression check ─────────────────────────────────────────
          # Reads the promotedSha tag stamped after every successful smoke test.
          # Blocks the promotion if the incoming SHA is older than what is already
          # live, preventing a faster-but-older pipeline run from overwriting newer code.
          CURRENT_SHA=$(az containerapp show \
            -n ca-spc-prod-backend -g rg-spc-prod-pl \
            --query "tags.promotedSha" -o tsv 2>/dev/null || echo "")
          echo "current_prod_sha=$CURRENT_SHA" >> $GITHUB_OUTPUT

          if [[ "$FORCE" != "true" && -n "$CURRENT_SHA" && "$SHA" != "$CURRENT_SHA" ]]; then
            if git merge-base --is-ancestor "$SHA" "$CURRENT_SHA"; then
              echo "⚠️  SHA $SHA is older than currently promoted $CURRENT_SHA."
              echo "    Use workflow_dispatch with force=true for an intentional rollback."
              echo "should_skip=true" >> $GITHUB_OUTPUT
              echo "deploy_backend=false" >> $GITHUB_OUTPUT
              echo "deploy_frontend=false" >> $GITHUB_OUTPUT
              echo "backend_sha=" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "should_skip=false" >> $GITHUB_OUTPUT

          # ── Backend image resolution ─────────────────────────────────────
          # Check the promoted SHA first. If this is a frontend-only commit with no
          # backend image, walk back through git history (commits that touched backend/)
          # to find the most recent ancestor that has an ACR image. Any such commit was
          # built by CI and passed E2E on dev before reaching main, so it is safe to
          # promote. Searching is bounded to the last 20 backend commits to stay fast.
          ACR_NAME=$(az acr list -g rg-spc-shared-pl --query "[0].name" -o tsv)
          BACKEND_SHA=""

          if az acr repository show-tags \
              --name "$ACR_NAME" --repository backend \
              --query "contains(@, '$SHA')" -o tsv 2>/dev/null | grep -q "^true$"; then
            BACKEND_SHA="$SHA"
            echo "Backend image found for promoted SHA $SHA."
          else
            echo "ℹ️  No backend image for SHA $SHA (frontend-only commit)."
            echo "   Searching git history for the most recent ancestor with a backend image..."
            while IFS= read -r COMMIT; do
              HAS=$(az acr repository show-tags \
                --name "$ACR_NAME" --repository backend \
                --query "contains(@, '$COMMIT')" -o tsv 2>/dev/null || echo "false")
              if [[ "$HAS" == "true" ]]; then
                BACKEND_SHA="$COMMIT"
                echo "   Found validated backend image at ancestor commit $BACKEND_SHA."
                break
              fi
            done < <(git log --format="%H" -20 "$SHA" -- backend/)
            if [[ -z "$BACKEND_SHA" ]]; then
              echo "   No backend image found in the last 20 backend commits."
            fi
          fi
          echo "backend_sha=$BACKEND_SHA" >> $GITHUB_OUTPUT

          # ── Per-component deploy decision ────────────────────────────────
          # Read the component-level stamps written by the smoke-test job after each
          # successful prod deployment. These track independently which backend image
          # and which frontend source commit are currently live in production.
          PROD_BACKEND_SHA=$(az containerapp show \
            -n ca-spc-prod-backend -g rg-spc-prod-pl \
            --query "tags.promotedBackendSha" -o tsv 2>/dev/null || echo "")
          PROD_FRONTEND_SHA=$(az containerapp show \
            -n ca-spc-prod-backend -g rg-spc-prod-pl \
            --query "tags.promotedFrontendSha" -o tsv 2>/dev/null || echo "")
          echo "Current prod backend image SHA : ${PROD_BACKEND_SHA:-(none)}"
          echo "Current prod frontend source SHA: ${PROD_FRONTEND_SHA:-(none)}"

          # Backend: deploy when the resolved image differs from what is already live,
          # or always on a forced rollback.
          if [[ "$FORCE" == "true" && -n "$BACKEND_SHA" ]]; then
            echo "deploy_backend=true" >> $GITHUB_OUTPUT
            echo "Force mode: backend will be deployed ($BACKEND_SHA)."
          elif [[ -z "$BACKEND_SHA" ]]; then
            echo "deploy_backend=false" >> $GITHUB_OUTPUT
            echo "No backend image available; backend deployment skipped."
          elif [[ "$BACKEND_SHA" == "$PROD_BACKEND_SHA" ]]; then
            echo "deploy_backend=false" >> $GITHUB_OUTPUT
            echo "Backend image $BACKEND_SHA already running in prod; skipping backend deployment."
          else
            echo "deploy_backend=true" >> $GITHUB_OUTPUT
            echo "Backend will be deployed: ${PROD_BACKEND_SHA:-(none)} → $BACKEND_SHA"
          fi

          # Frontend: deploy when frontend/ source changed since the last deployed commit,
          # or always on a forced rollback or first-ever deployment.
          if [[ "$FORCE" == "true" ]]; then
            echo "deploy_frontend=true" >> $GITHUB_OUTPUT
            echo "Force mode: frontend will be deployed."
          elif [[ -z "$PROD_FRONTEND_SHA" ]]; then
            echo "deploy_frontend=true" >> $GITHUB_OUTPUT
            echo "No prior prod frontend SHA found; deploying frontend (first deployment)."
          elif [[ "$PROD_FRONTEND_SHA" == "$SHA" ]]; then
            echo "deploy_frontend=false" >> $GITHUB_OUTPUT
            echo "Frontend already at SHA $SHA; skipping frontend deployment."
          else
            DIFF=$(git diff --name-only "$PROD_FRONTEND_SHA" "$SHA" -- frontend/ 2>/dev/null | head -1 || echo "")
            if [[ -n "$DIFF" ]]; then
              echo "deploy_frontend=true" >> $GITHUB_OUTPUT
              echo "Frontend source changed since $PROD_FRONTEND_SHA; deploying frontend."
            else
              echo "deploy_frontend=false" >> $GITHUB_OUTPUT
              echo "Frontend source unchanged since $PROD_FRONTEND_SHA; skipping frontend deployment."
            fi
          fi

          # ── Infrastructure change warning ────────────────────────────────
          # Prod infra is now part of the sequential Infrastructure Deployment
          # workflow. Warn if infra files changed since the last promoted SHA
          # so the operator knows to ensure the infra pipeline is running or
          # has completed for prod.
          if [[ -n "$CURRENT_SHA" ]]; then
            INFRA_CHANGED=$(git diff --name-only "$CURRENT_SHA" "$SHA" -- infrastructure/ | head -1)
          else
            INFRA_CHANGED=$(git diff --name-only "$SHA^" "$SHA" -- infrastructure/ | head -1)
          fi
          if [[ -n "$INFRA_CHANGED" ]]; then
            echo "⚠️  Infrastructure files changed in this commit range."
            echo "   Ensure the sequential 'Infrastructure Deployment' workflow is triggered"
            echo "   and approved for 'prod' to apply these changes."
          fi

  # ── Dev Health Gate ───────────────────────────────────────────────────────
  verify-dev:
    name: "Verify Dev is Healthy"
    needs: gate
    # Skip when: SHA regression blocked everything; this is a forced rollback
    # (a prod incident rollback must not be blocked by a dev health failure);
    # or both components are already up to date in prod (nothing to deploy).
    if: >
      needs.gate.outputs.should_skip == 'false' &&
      needs.gate.outputs.is_forced != 'true' &&
      (needs.gate.outputs.deploy_backend == 'true' || needs.gate.outputs.deploy_frontend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Health check dev backend (with retry)
        run: |
          BACKEND_FQDN=$(az containerapp show \
            -n ca-spc-dev-backend -g rg-spc-dev-pl \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          URL="https://$BACKEND_FQDN/health"
          echo "Probing $URL"
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Dev health check passed."
              exit 0
            fi
            sleep 15
          done
          echo "Dev backend unhealthy — blocking prod promotion."
          exit 1

  # ── Backend Deploy ────────────────────────────────────────────────────────
  deploy-backend-prod:
    name: "Deploy Backend (prod)"
    needs: [gate, verify-dev]
    # Skipped when the resolved backend image is already running in prod, or when no
    # backend image exists anywhere in ACR. verify-dev is skipped on force=true or
    # no-op; GitHub evaluates skipped as satisfied for downstream needs.
    if: needs.gate.outputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Re-check SHA regression after approval wait
        # If a prod environment requires manual approval, another deployment may
        # have completed while this job was waiting. Re-read the live promotedSha
        # and abort if it changed, preventing a stale approval from overwriting
        # a newer deployment.
        run: |
          LIVE_SHA=$(az containerapp show \
            -n ca-spc-prod-backend -g rg-spc-prod-pl \
            --query "tags.promotedSha" -o tsv 2>/dev/null || echo "")
          EXPECTED_SHA="${{ needs.gate.outputs.current_prod_sha }}"
          if [[ "$LIVE_SHA" != "$EXPECTED_SHA" ]]; then
            echo "ERROR: Production SHA changed since the gate ran."
            echo "  Expected: ${EXPECTED_SHA:-'(none - first deployment)'}"
            echo "  Actual:   ${LIVE_SHA:-'(none)'}"
            echo "Another deployment completed during the approval wait."
            echo "Re-trigger promotion if this SHA should still be deployed."
            exit 1
          fi

      - name: Get ACR name
        id: get_acr
        run: |
          ACR_NAME=$(az acr list -g rg-spc-shared-pl --query "[0].name" -o tsv)
          echo "acr_name=$ACR_NAME" >> $GITHUB_OUTPUT

      - name: Update Migration Job Image
        run: |
          az containerapp job update \
            --name job-spc-prod-migrate \
            --resource-group rg-spc-prod-pl \
            --image ${{ steps.get_acr.outputs.acr_name }}.azurecr.io/backend:${{ needs.gate.outputs.backend_sha }}

      - name: Run Migrations
        run: |
          EXECUTION_NAME=$(az containerapp job start \
            --name job-spc-prod-migrate \
            --resource-group rg-spc-prod-pl \
            --query name -o tsv)
          echo "Started execution: $EXECUTION_NAME"

          for i in $(seq 1 36); do
            STATUS=$(az containerapp job execution show \
              --name job-spc-prod-migrate \
              --resource-group rg-spc-prod-pl \
              --job-execution-name "$EXECUTION_NAME" \
              --query "properties.status" -o tsv)
            echo "[$i/36] $STATUS"

            if [[ "$STATUS" == "Succeeded" ]]; then
              echo "Migrations completed."
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Stopped" ]]; then
              echo "Migration failed. Fetching execution details and logs..."
              sleep 5
              az containerapp job execution show \
                --name job-spc-prod-migrate \
                --resource-group rg-spc-prod-pl \
                --job-execution-name "$EXECUTION_NAME" \
                --query "{status: properties.status, startTime: properties.startTime, endTime: properties.endTime}" -o json || true
              CONTAINER_NAME=$(az containerapp job execution show \
                --name job-spc-prod-migrate \
                --resource-group rg-spc-prod-pl \
                --job-execution-name "$EXECUTION_NAME" \
                --query "properties.template.containers[0].name" -o tsv) || CONTAINER_NAME=""
              if [[ -n "$CONTAINER_NAME" ]]; then
                az containerapp job logs show \
                  --name job-spc-prod-migrate \
                  --resource-group rg-spc-prod-pl \
                  --execution "$EXECUTION_NAME" \
                  --container "$CONTAINER_NAME" || true
              else
                echo "Could not determine migration container name for execution '$EXECUTION_NAME'."
              fi
              exit 1
            fi
            sleep 10
          done

          echo "Timed out waiting for migration job after 6 minutes."
          exit 1

      - name: Deploy Backend
        run: |
          FRONTEND_URL=$(az staticwebapp show \
            -n swa-spc-prod -g rg-spc-prod-pl \
            --query "defaultHostname" -o tsv)

          PREV_REVISION=$(az containerapp revision list \
            --name ca-spc-prod-backend \
            --resource-group rg-spc-prod-pl \
            --query "[?properties.active].name | [0]" -o tsv)

          echo "Deploying backend image: ${{ needs.gate.outputs.backend_sha }} (frontend commit: ${{ needs.gate.outputs.sha }})"
          az containerapp update \
            --name ca-spc-prod-backend \
            --resource-group rg-spc-prod-pl \
            --container-name backend \
            --image ${{ steps.get_acr.outputs.acr_name }}.azurecr.io/backend:${{ needs.gate.outputs.backend_sha }} \
            --set-env-vars FRONTEND_URL=https://$FRONTEND_URL || \
          (echo "Deploy failed — rolling back to $PREV_REVISION" && \
           az containerapp revision activate \
             --revision "$PREV_REVISION" \
             --name ca-spc-prod-backend \
             --resource-group rg-spc-prod-pl && exit 1)

  # ── Frontend Deploy ───────────────────────────────────────────────────────
  deploy-frontend-prod:
    name: "Deploy Frontend (prod)"
    needs: [gate, verify-dev]
    # Skipped when frontend/ source is identical to the last deployed commit.
    if: needs.gate.outputs.should_skip == 'false' && needs.gate.outputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.sha }}   # pin to the exact SHA being promoted

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Re-check SHA regression after approval wait
        # Mirrors the same guard in deploy-backend-prod. Prevents a stale approval
        # on a frontend-only release from overwriting a newer frontend deployment.
        run: |
          LIVE_SHA=$(az containerapp show \
            -n ca-spc-prod-backend -g rg-spc-prod-pl \
            --query "tags.promotedSha" -o tsv 2>/dev/null || echo "")
          EXPECTED_SHA="${{ needs.gate.outputs.current_prod_sha }}"
          if [[ "$LIVE_SHA" != "$EXPECTED_SHA" ]]; then
            echo "ERROR: Production SHA changed since the gate ran."
            echo "  Expected: ${EXPECTED_SHA:-'(none - first deployment)'}"
            echo "  Actual:   ${LIVE_SHA:-'(none)'}"
            echo "Another deployment completed during the approval wait."
            echo "Re-trigger promotion if this SHA should still be deployed."
            exit 1
          fi

      - name: Fetch prod config
        id: config
        run: |
          BACKEND_FQDN=$(az containerapp show \
            -n ca-spc-prod-backend -g rg-spc-prod-pl \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "backend_url=https://$BACKEND_FQDN" >> $GITHUB_OUTPUT

          az extension add --name staticwebapp
          SWA_TOKEN=$(az staticwebapp secrets list \
            -n swa-spc-prod -g rg-spc-prod-pl \
            --query "properties.apiKey" -o tsv)
          echo "swa_token=$SWA_TOKEN" >> $GITHUB_OUTPUT

          az extension add --name application-insights
          AI_CONN_STR=$(az monitor app-insights component show \
            --app ai-spc-prod -g rg-spc-prod-pl \
            --query connectionString -o tsv)
          echo "ai_conn_str=$AI_CONN_STR" >> $GITHUB_OUTPUT

      - name: Build and Deploy to prod SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
          app_build_command: "npm run build"
          azure_static_web_apps_api_token: ${{ steps.config.outputs.swa_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          VITE_API_URL: ${{ steps.config.outputs.backend_url }}
          VITE_LOGIC_APP_FEEDBACK_URL: ${{ secrets.VITE_LOGIC_APP_FEEDBACK_URL }}
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ steps.config.outputs.ai_conn_str }}

  # ── Smoke Test + Stamp ────────────────────────────────────────────────────
  smoke-test:
    name: "Smoke Test + Mark Promoted (prod)"
    needs: [gate, verify-dev, deploy-backend-prod, deploy-frontend-prod]
    # Run if at least one deploy succeeded and none failed.
    # 'skipped' is acceptable (e.g. backend skipped on a frontend-only change,
    # or verify-dev skipped on a force rollback).
    if: |
      always() &&
      needs.gate.result == 'success' &&
      (needs.verify-dev.result == 'success' || needs.verify-dev.result == 'skipped') &&
      (needs.deploy-backend-prod.result == 'success' || needs.deploy-backend-prod.result == 'skipped') &&
      (needs.deploy-frontend-prod.result == 'success' || needs.deploy-frontend-prod.result == 'skipped') &&
      (needs.deploy-backend-prod.result == 'success' || needs.deploy-frontend-prod.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: prod
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Health check prod backend (with retry)
        run: |
          BACKEND_FQDN=$(az containerapp show \
            -n ca-spc-prod-backend -g rg-spc-prod-pl \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          URL="https://$BACKEND_FQDN/health"
          echo "Probing $URL"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Prod health check passed."
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 10 attempts."
          exit 1

      - name: Stamp promotion tags on Container App
        # Three tags are stamped after the smoke test passes:
        # - promotedSha: the overall commit SHA used for the SHA regression check.
        # - promotedBackendSha: the backend image SHA now running; used as the
        #   fallback source when a future frontend-only commit has no backend image.
        # - promotedFrontendSha: the commit SHA the frontend was built from; used
        #   to detect whether frontend/ source has changed since the last deployment.
        # Only the component tags that were actually deployed are updated so that a
        # backend-only promotion does not overwrite the frontend stamp and vice-versa.
        run: |
          SHA="${{ needs.gate.outputs.sha }}"
          BACKEND_SHA="${{ needs.gate.outputs.backend_sha }}"

          az containerapp update \
            --name ca-spc-prod-backend \
            --resource-group rg-spc-prod-pl \
            --tags promotedSha="$SHA"

          if [[ "${{ needs.deploy-backend-prod.result }}" == "success" ]]; then
            az containerapp update \
              --name ca-spc-prod-backend \
              --resource-group rg-spc-prod-pl \
              --tags promotedBackendSha="$BACKEND_SHA"
          fi

          if [[ "${{ needs.deploy-frontend-prod.result }}" == "success" ]]; then
            az containerapp update \
              --name ca-spc-prod-backend \
              --resource-group rg-spc-prod-pl \
              --tags promotedFrontendSha="$SHA"
          fi

      - name: Write deployment summary
        run: |
          echo "## Prod Deployment — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Promoted SHA** | \`${{ needs.gate.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend image SHA** | \`${{ needs.gate.outputs.backend_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Forced rollback** | ${{ needs.gate.outputs.is_forced }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend** | ${{ needs.deploy-backend-prod.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | ${{ needs.deploy-frontend-prod.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Smoke test** | passed |" >> $GITHUB_STEP_SUMMARY

  # ── No-op Summary ─────────────────────────────────────────────────────────
  notify-no-op:
    name: "Nothing to deploy (FE and BE already up to date)"
    needs: [gate, verify-dev, deploy-backend-prod, deploy-frontend-prod]
    # Runs when the gate determined both components are already current in prod.
    # verify-dev will have been skipped in this case; the deploy jobs will also
    # be skipped. Surfacing an explicit summary prevents silent "successful" runs
    # that deployed nothing.
    if: |
      always() &&
      needs.gate.result == 'success' &&
      needs.gate.outputs.should_skip == 'false' &&
      (needs.verify-dev.result == 'success' || needs.verify-dev.result == 'skipped') &&
      needs.deploy-backend-prod.result == 'skipped' &&
      needs.deploy-frontend-prod.result == 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Write no-op summary
        run: |
          echo "## Prod Deployment — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Both frontend and backend are already up to date in production." >> $GITHUB_STEP_SUMMARY
          echo "No deployment was performed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA** | \`${{ needs.gate.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend image SHA** | \`${{ needs.gate.outputs.backend_sha }}\` |" >> $GITHUB_STEP_SUMMARY
