name: "Frontend Deployment (Dev)"

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev # Connects to the 'dev' environment in GitHub Settings
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Backend URL
        id: fetch_url
        run: |
          BACKEND_URL=$(az containerapp show -n ca-spc-dev-backend -g rg-spc-dev-pl --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "backend_url=https://$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Build And Deploy
        id: build_deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
          app_build_command: "npm run build"
          # Tokenless deployment using OIDC credentials from azure/login
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          azure_static_web_apps_api_token: "" # Explicitly empty to trigger RBAC
        env:
          # Uses the dynamic URL fetched in the previous step
          VITE_API_URL: ${{ steps.fetch_url.outputs.backend_url }}
          VITE_LOGIC_APP_FEEDBACK_URL: ${{ secrets.VITE_LOGIC_APP_FEEDBACK_URL }}
