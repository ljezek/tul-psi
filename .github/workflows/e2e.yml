name: "E2E Tests"

on:
  # Run after backend or frontend deployments complete on main.
  workflow_run:
    workflows:
      - "Backend Deployment (Dev)"
      - "Frontend Deployment (Dev)"
    types: [completed]
    branches: [main]
  # Also callable from other workflows (e.g. the prod deployment gate).
  workflow_call:
    outputs:
      result:
        description: "E2E test job result"
        value: ${{ jobs.e2e.result }}

# Allow only one e2e run at a time; cancel the in-flight run if a newer one starts.
concurrency:
  group: e2e-main
  cancel-in-progress: true

jobs:
  e2e:
    # Only proceed when triggered by a successful upstream workflow.
    # (workflow_call triggers have no event.workflow_run, so the condition is skipped.)
    if: >
      github.event_name == 'workflow_call' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright and dependencies
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start e2e stack (db + backend)
        run: |
          docker compose -f docker-compose.e2e.yaml up -d --wait --build
        # --wait propagates Compose service healthchecks:
        #   db: pg_isready, backend: curl /health.
        # No manual sleep needed.

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8001
        run: npm ci && npm run build

      - name: Serve frontend (background)
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8001
        run: npx vite preview --port 3000 &

      - name: Wait for frontend to be ready
        working-directory: e2e
        run: |
          npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Playwright tests
        working-directory: e2e
        env:
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8001
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Tear down e2e stack and remove volumes
        if: always()
        run: docker compose -f docker-compose.e2e.yaml down -v
        # -v removes the postgres-data-e2e volume — ephemeral guarantee
