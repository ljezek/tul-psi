name: "Reusable Environment Deployment"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deploy_debug_tools:
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      JWT_SECRET:
        required: true
      PGADMIN_AAD_CLIENT_ID:
        required: false
      PGADMIN_AAD_CLIENT_SECRET:
        required: false
      SMTP_PASSWORD:
        required: true

jobs:
  deploy:
    name: "Deploy ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ENV_NAME: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Shared Outputs
        id: shared_outputs
        run: |
          echo "Fetching ACR name..."
          ACR_NAME=$(az acr list -g rg-spc-shared-pl --query "[0].name" -o tsv)
          
          echo "Fetching Database Host..."
          DB_HOST=$(az postgres flexible-server list -g rg-spc-shared-pl --query "[0].fullyQualifiedDomainName" -o tsv)

          echo "Fetching Subnet ID for ${{ env.ENV_NAME }}..."
          SNET_NAME="snet-${{ env.ENV_NAME }}"
          SNET_ID=$(az network vnet subnet show -g rg-spc-shared-pl --vnet-name vnet-spc-shared -n $SNET_NAME --query id -o tsv)

          echo "Fetching Shared DB Bootstrap outputs..."
          SHARED_OUTPUTS=$(az deployment group show -g rg-spc-shared-pl -n shared-deployment --query properties.outputs)
          ID_DB_SETUP_ID=$(echo $SHARED_OUTPUTS | jq -r .idDbSetupId.value)
          ID_DB_SETUP_NAME=$(echo $SHARED_OUTPUTS | jq -r .idDbSetupName.value)
          STORAGE_ACCOUNT_NAME=$(echo $SHARED_OUTPUTS | jq -r .storageAccountName.value)
          SCRIPTS_SNET_ID=$(echo $SHARED_OUTPUTS | jq -r .snetScriptsId.value)

          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          echo "DB_HOST=$DB_HOST" >> $GITHUB_ENV
          echo "SNET_ID=$SNET_ID" >> $GITHUB_ENV
          echo "ID_DB_SETUP_ID=$ID_DB_SETUP_ID" >> $GITHUB_ENV
          echo "ID_DB_SETUP_NAME=$ID_DB_SETUP_NAME" >> $GITHUB_ENV
          echo "STORAGE_ACCOUNT_NAME=$STORAGE_ACCOUNT_NAME" >> $GITHUB_ENV
          echo "SCRIPTS_SNET_ID=$SCRIPTS_SNET_ID" >> $GITHUB_ENV
          
          CURRENT_IMAGE=$(az containerapp show -n ca-spc-${{ env.ENV_NAME }}-backend -g rg-spc-${{ env.ENV_NAME }}-pl --query "properties.template.containers[?name=='backend'].image" -o tsv 2>/dev/null || echo "")
          echo "CURRENT_IMAGE=$CURRENT_IMAGE" >> $GITHUB_ENV

      - name: Deploy Environment Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          deploymentName: env-deployment-${{ env.ENV_NAME }}
          resourceGroupName: rg-spc-${{ env.ENV_NAME }}-pl
          template: ./infrastructure/environment.bicep
          parameters: >
            env=${{ env.ENV_NAME }}
            subnetId=${{ env.SNET_ID }}
            acrName=${{ env.ACR_NAME }}
            acrResourceGroup=rg-spc-shared-pl
            dbHost=${{ env.DB_HOST }}
            dbName=spc_${{ env.ENV_NAME }}
            idDbSetupId=${{ env.ID_DB_SETUP_ID }}
            idDbSetupName=${{ env.ID_DB_SETUP_NAME }}
            storageAccountName=${{ env.STORAGE_ACCOUNT_NAME }}
            scriptsSubnetId=${{ env.SCRIPTS_SNET_ID }}
            deployDebugTools=${{ inputs.deploy_debug_tools }}
            jwtSecret=${{ secrets.JWT_SECRET }}
            smtpPassword=${{ secrets.SMTP_PASSWORD }}
            pgadminAadClientId=${{ secrets.PGADMIN_AAD_CLIENT_ID }}
            pgadminAadClientSecret=${{ secrets.PGADMIN_AAD_CLIENT_SECRET }}
            ${{ env.CURRENT_IMAGE != '' && format('containerImage={0}', env.CURRENT_IMAGE) || '' }}
