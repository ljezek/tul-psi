name: Infrastructure Gate
on:
  pull_request:
    paths-ignore:
      - 'infrastructure/**'
    branches: [ main ]

# This workflow runs when no infrastructure files changed.
# It satisfies the required "validate-infrastructure" branch-protection check.
jobs:
  test-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: No infrastructure changes — skipping checks
        run: echo "No infrastructure files were modified. Infrastructure gate skipped."
