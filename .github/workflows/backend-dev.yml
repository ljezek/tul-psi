name: "Backend Deployment (Dev)"

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    outputs:
      acr_name: ${{ steps.get_acr.outputs.acr_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Shared Outputs
        id: get_acr
        run: |
          echo "Fetching ACR name from resource group..."
          ACR_NAME=$(az acr list -g rg-spc-shared-pl --query "[0].name" -o tsv)
          echo "acr_name=$ACR_NAME" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image
        run: |
          az acr login --name ${{ steps.get_acr.outputs.acr_name }}
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          # Format: [BaseVersion]-b[RunNumber]+[ShortSHA] (e.g., 0.1.0-b42+a1b2c3d)
          VERSION="0.1.0-b${{ github.run_number }}+${SHORT_SHA}"
          echo "Building version: $VERSION"
          docker build \
            --build-arg APP_VERSION=$VERSION \
            -t ${{ steps.get_acr.outputs.acr_name }}.azurecr.io/backend:${{ github.sha }} \
            -t ${{ steps.get_acr.outputs.acr_name }}.azurecr.io/backend:latest \
            ./backend
          docker push ${{ steps.get_acr.outputs.acr_name }}.azurecr.io/backend:${{ github.sha }}
          docker push ${{ steps.get_acr.outputs.acr_name }}.azurecr.io/backend:latest

  migrate-and-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Migrations Job Image
        run: |
          az containerapp job update \
            --name job-spc-dev-migrate \
            --resource-group rg-spc-dev-pl \
            --image ${{ needs.build-and-push.outputs.acr_name }}.azurecr.io/backend:${{ github.sha }}

      - name: Run Migrations and Seed
        run: |
          EXECUTION_NAME=$(az containerapp job start \
            --name job-spc-dev-migrate \
            --resource-group rg-spc-dev-pl \
            --query name -o tsv)
          echo "Started execution: $EXECUTION_NAME"
          
          # Poll for completion
          for i in $(seq 1 36); do
            STATUS=$(az containerapp job execution show \
              --name job-spc-dev-migrate \
              --resource-group rg-spc-dev-pl \
              --job-execution-name "$EXECUTION_NAME" \
              --query "properties.status" -o tsv)
            echo "Status [$i/36]: $STATUS"
            
            if [[ "$STATUS" == "Succeeded" ]]; then
              echo "Job completed successfully."
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Stopped" ]]; then
              echo "Job failed with status: $STATUS"
              echo "--- Fetching Job Logs ---"
              # We use a slight delay to ensure logs are available in the console
              sleep 5
              az containerapp job execution show \
                --name job-spc-dev-migrate \
                --resource-group rg-spc-dev-pl \
                --job-execution-name "$EXECUTION_NAME" \
                --query "properties.template.containers[0].name" -o tsv | xargs -I {} \
              az containerapp job log show \
                --name job-spc-dev-migrate \
                --resource-group rg-spc-dev-pl \
                --job-execution-name "$EXECUTION_NAME" \
                --container {}
              exit 1
            fi
            sleep 10
          done
          
          echo "Timed out waiting for job."
          exit 1

      - name: Update Backend App
        run: |
          FRONTEND_URL=$(az staticwebapp show -n swa-spc-dev -g rg-spc-dev-pl --query "defaultHostname" -o tsv)
          
          echo "Capturing current active revision for rollback..."
          PREV_REVISION=$(az containerapp revision list \
            --name ca-spc-dev-backend \
            --resource-group rg-spc-dev-pl \
            --query "[?properties.active].name | [0]" -o tsv)
          echo "Current active revision: $PREV_REVISION"
          
          echo "Updating backend app to new image..."
          az containerapp update \
            --name ca-spc-dev-backend \
            --resource-group rg-spc-dev-pl \
            --container-name backend \
            --image ${{ needs.build-and-push.outputs.acr_name }}.azurecr.io/backend:${{ github.sha }} \
            --set-env-vars FRONTEND_URL=https://$FRONTEND_URL || \
          (echo "Deployment failed! Rolling back to revision: $PREV_REVISION" && \
           az containerapp revision activate \
             --revision "$PREV_REVISION" \
             --name ca-spc-dev-backend \
             --resource-group rg-spc-dev-pl && exit 1)
