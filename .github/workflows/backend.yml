name: Backend Gate
on:
  pull_request:
    paths:
      - 'backend/**'
    branches: [ main ]

jobs:
  test-and-lint-backend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Ruff lint
        run: ruff check .
      - name: Run Ruff format check
        run: ruff format --check .
      - name: Run tests
        run: pytest
