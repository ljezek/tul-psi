name: Frontend Gate
on:
  pull_request:
    paths:
      - 'frontend/**'
    branches: [ main ]

jobs:
  test-and-lint-frontend:
    permissions:
      contents: read
      pull-requests: write # Required for posting the preview link comment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint
      - name: Run Unit Tests
        run: npm test

  build-and-deploy-preview:
    needs: test-and-lint-frontend
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build And Deploy Staging
        id: build_deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
          app_build_command: "npm run build"
          # Tokenless deployment using OIDC credentials from azure/login
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          azure_static_web_apps_api_token: "" # Explicitly empty to trigger RBAC
