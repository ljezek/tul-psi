name: Frontend Gate
on:
  pull_request:
    paths:
      - 'frontend/**'
    branches: [ main ]

jobs:
  test-and-lint-frontend:
    permissions:
      contents: read
      pull-requests: write # Required for posting the preview link comment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint
      - name: Run Unit Tests
        run: npm test

  build-and-deploy-preview:
    needs: test-and-lint-frontend
    runs-on: ubuntu-latest
    environment: dev # Use dev environment for preview secrets
    permissions:
      id-token: write # Required for OIDC
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Backend URL and SWA Token
        id: fetch_secrets
        run: |
          # 1. Fetch Backend URL
          BACKEND_URL=$(az containerapp show -n ca-spc-dev-backend -g rg-spc-dev-pl --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "backend_url=https://$BACKEND_URL" >> $GITHUB_OUTPUT
          
          # 2. Fetch Temporary SWA Deployment Token
          az extension add --name static-webapp
          SWA_TOKEN=$(az staticwebapp secrets list -n swa-spc-dev -g rg-spc-dev-pl --query "properties.apiKey" -o tsv)
          echo "swa_token=$SWA_TOKEN" >> $GITHUB_OUTPUT

      - name: Build And Deploy Staging
        id: build_deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
          app_build_command: "npm run build"
          # Uses the temporary token fetched in the previous step
          azure_static_web_apps_api_token: ${{ steps.fetch_secrets.outputs.swa_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          VITE_API_URL: ${{ steps.fetch_secrets.outputs.backend_url }}
          VITE_LOGIC_APP_FEEDBACK_URL: ${{ secrets.VITE_LOGIC_APP_FEEDBACK_URL }}
