name: "Infrastructure Deployment"

on:
  push:
    branches: [ main ]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (manual override)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - dev
          - prod

concurrency:
  group: infra-${{ github.event.inputs.environment || 'all' }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-shared:
    name: "Deploy Shared"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Shared Bicep
        id: shared_deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          deploymentName: shared-deployment
          resourceGroupName: rg-spc-shared-pl
          template: ./infrastructure/shared.bicep

  deploy-dev:
    name: "Deploy Dev"
    needs: deploy-shared
    if: github.event_name == 'push' || github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev'
    uses: ./.github/workflows/reusable-infra-env.yml
    with:
      environment: dev
      deploy_debug_tools: true
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      PGADMIN_AAD_CLIENT_ID: ${{ secrets.PGADMIN_AAD_CLIENT_ID }}
      PGADMIN_AAD_CLIENT_SECRET: ${{ secrets.PGADMIN_AAD_CLIENT_SECRET }}

  deploy-prod:
    name: "Deploy Prod"
    needs: [deploy-shared, deploy-dev]
    if: |
      always() &&
      needs.deploy-shared.result == 'success' &&
      (needs.deploy-dev.result == 'success' || needs.deploy-dev.result == 'skipped') &&
      (github.event_name == 'push' || github.event.inputs.environment == 'all' || github.event.inputs.environment == 'prod')
    uses: ./.github/workflows/reusable-infra-env.yml
    with:
      environment: prod
      deploy_debug_tools: false
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
