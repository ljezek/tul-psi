# Local PostgreSQL instance for Student Projects Catalogue development.
#
# Usage:
#   cp .env.example .env        # first time only
#   docker compose up -d        # start the database
#   docker compose down         # stop the database
#   docker compose down -v      # stop and wipe all data

services:
  db:
    image: postgres:17-alpine
    container_name: tul-psi-db
    # Do not restart automatically – in local dev the developer controls the lifecycle.
    restart: "no"
    env_file: .env
    # The official postgres image uses POSTGRES_USER / POSTGRES_PASSWORD to
    # create the initial superuser.  We expose them as POSTGRES_ADMIN_USER /
    # POSTGRES_ADMIN_PASSWORD in .env so the naming is unambiguous, and map
    # them here to what the image expects.
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-tul_psi_admin}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-tul_psi_admin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # init-db.sh is executed once on first container start to create the
      # limited-privilege application role (tul_psi_app).
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-tul_psi_admin} -d ${POSTGRES_DB:-student_projects}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
