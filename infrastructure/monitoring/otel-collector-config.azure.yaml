receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]

processors:
  batch:
  resourcedetection:
    detectors: [env, azure]

exporters:
  azuremonitor:
    connection_string: "${env:APPLICATIONINSIGHTS_CONNECTION_STRING}"

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [azuremonitor, debug]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [azuremonitor, debug]
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [azuremonitor, debug]
