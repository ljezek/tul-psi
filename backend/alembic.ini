# Alembic configuration for Student Projects Catalogue.
# See migrations/env.py — DATABASE_URL is injected from application settings at runtime.

[alembic]
# Path to migration scripts.
script_location = %(here)s/migrations

# Prepend backend root to sys.path so that settings.py is importable from env.py.
prepend_sys_path = %(here)s

# Use OS-native path separator for version_locations / prepend_sys_path.
path_separator = os

# Database URL — overridden at runtime by migrations/env.py from DATABASE_URL env var.
sqlalchemy.url =


[post_write_hooks]
# Automatically lint newly generated revision scripts with Ruff.
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
